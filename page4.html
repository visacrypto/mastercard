<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MasterCard – Exchange Trading | Stocks, Oil, Metals, Commodities</title>
    <link rel="icon" href="mc-favicon.png" type="image/png" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #fff; line-height: 1.6; overflow-x: hidden; }
        a { color: #eb001b; text-decoration: none; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .lang-bar {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 0;
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .lang-bar .container { display: flex; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
        .lang-bar a { color: #7a84a3; transition: color 0.3s; font-weight: 500; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
        .lang-bar a:hover { color: #fff; background: rgba(255,255,255,0.06); }
        .lang-bar a.active { color: #eb001b; background: rgba(235,0,27,0.12); }

        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a1a4e, #0a0a1a 70%);
            overflow: hidden;
        }
        .bg-canvas::before {
            content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(235,0,27,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(247,158,27,0.06) 0%, transparent 50%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }
        @keyframes bgPulse { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-5%,-3%) scale(1.1); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: orbFloat 18s infinite alternate ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: #eb001b; top: -10%; left: -5%; }
        .orb-2 { width: 400px; height: 400px; background: #f79e1b; bottom: -10%; right: -5%; animation-delay: -6s; }
        .orb-3 { width: 300px; height: 300px; background: #9945ff; top: 50%; left: 50%; animation-delay: -12s; }
        .orb-4 { width: 350px; height: 350px; background: #ff6b6b; top: 20%; right: 10%; animation-delay: -4s; }
        .orb-5 { width: 250px; height: 250px; background: #ffd93d; bottom: 20%; left: 10%; animation-delay: -9s; }
        @keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,-40px) scale(1.2); } }

        .ticker-wrap {
            position: relative; z-index: 5; width: 100%; overflow: hidden;
            background: rgba(255,255,255,0.03);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 10px 0;
            white-space: nowrap;
        }
        .ticker {
            display: inline-block;
            animation: tickerScroll 30s linear infinite;
            font-size: 14px;
            font-weight: 500;
            color: #b0b8d1;
        }
        .ticker span { margin: 0 40px; color: #eb001b; }
        .ticker .highlight { color: #f79e1b; }
        @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        header {
            position: relative; z-index: 10; padding: 18px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            background: rgba(10,10,26,0.6);
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .logo-wrap { display: flex; align-items: center; gap: 12px; }
        .logo-wrap img { height: 44px; width: auto; }
        .logo-wrap span {
            font-weight: 700; font-size: 22px; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #eb001b, #f79e1b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .nav-links a {
            font-size: 13px; font-weight: 500; color: #b0b8d1; transition: color 0.3s, background 0.3s;
            padding: 6px 12px; border-radius: 8px;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: #eb001b; background: rgba(235,0,27,0.1); }
        .btn-header {
            background: linear-gradient(135deg, #eb001b, #f79e1b);
            padding: 10px 28px; border-radius: 40px; font-weight: 600; font-size: 14px;
            color: #fff !important; transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(235,0,27,0.3);
        }
        .btn-header:hover { transform: scale(1.04); box-shadow: 0 6px 30px rgba(235,0,27,0.5); }

        .page-hero { position: relative; z-index: 5; padding: 40px 0 30px; text-align: center; }
        .page-hero h1 { font-size: clamp(32px, 4vw, 48px); font-weight: 700; }
        .page-hero h1 span { background: linear-gradient(135deg, #eb001b, #f79e1b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-hero p { color: #b0b8d1; max-width: 600px; margin: 12px auto 0; }

        .badge {
            display: inline-block; background: rgba(235,0,27,0.12); color: #eb001b;
            padding: 4px 18px; border-radius: 40px; font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px; margin-bottom: 14px; border: 1px solid rgba(235,0,27,0.15);
        }

        .section-title { text-align: center; margin: 40px 0 32px; }
        .section-title h2 { font-size: clamp(26px, 3vw, 36px); font-weight: 700; }
        .section-title p { color: #b0b8d1; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            margin: 24px 0;
            position: relative; z-index: 5;
        }
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px 18px;
            transition: transform 0.3s, border-color 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(235,0,27,0.25); }
        .card .icon { font-size: 28px; margin-bottom: 8px; display: block; }
        .card h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .card p { color: #b0b8d1; font-size: 13px; }
        .card .tag {
            display: inline-block; background: rgba(235,0,27,0.08); color: #eb001b;
            padding: 2px 12px; border-radius: 40px; font-size: 11px; font-weight: 600;
            margin-top: 8px; border: 1px solid rgba(235,0,27,0.08);
        }
        .card .link { display: block; margin-top: 10px; font-size: 13px; font-weight: 600; color: #eb001b; }
        .card .link:hover { text-decoration: underline; }

        .calculator-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px 28px;
            margin: 32px 0;
            position: relative; z-index: 5;
        }
        .calculator-section h3 { font-size: 22px; margin-bottom: 16px; }
        .calc-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }
        .calc-row label { font-size: 14px; color: #b0b8d1; display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
        .calc-row input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 16px;
            width: 100%;
        }
        .calc-row input:focus { outline: none; border-color: #eb001b; }
